# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0  # Cost savings - set to 1 when traffic increases
  maxInstances: 100
  concurrency: 80
  cpu: 1
  memoryMiB: 1024
  startupTimeoutSeconds: 300
  # Health check configuration
  readinessCheckPath: /api/readiness
  livenessCheckPath: /api/health

# Environment variables and secrets.
# env:
# Configure environment variables.
# See https://firebase.google.com/docs/app-hosting/configure#user-defined-environment
# - variable: MESSAGE
#   value: Hello world!
#   availability:
# - BUILD
# - RUNTIME

env:
  - variable: PORT
    value: "8080"
    availability:
      - RUNTIME
  # Growth Ad Engine master switch — ON enables the /admin/ads console to compose
  # drafts + dry-run activate (zero spend). Real spend needs GROWTH_ADS_MODE=live
  # ALSO set (deliberately absent → dry-run). See src/config/growth-ads.ts.
  - variable: GROWTH_ADS_ENABLED
    value: "true"
    availability:
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: projects/1061532538391/secrets/PUBLIC_FIREBASE_API_KEY/versions/1
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: projects/1061532538391/secrets/PUBLIC_FIREBASE_AUTH_DOMAIN/versions/1
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    secret: projects/1061532538391/secrets/PUBLIC_FIREBASE_PROJECT_ID/versions/1
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    secret: projects/1061532538391/secrets/PUBLIC_FIREBASE_STORAGE_BUCKET/versions/1
    availability:
      - BUILD
